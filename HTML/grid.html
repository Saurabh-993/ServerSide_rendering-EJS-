<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Grid</title>
    <link rel="stylesheet" href="../CSS/grid.css" />
  </head>
  <body>
    <header>
      <p>Here we will practice the concept of Grid.</p>
    </header>
    <main>
      <div class="container">
        <div class="firstelement"><p>First</p></div>
        <div class="secondelement"><p>Second</p></div>
        <div class="thirdelement"><p>Third</p></div>
        <div class="fourthelement"><p>Fourth</p></div>
        <div class="fifthelement"><p>Fifth</p></div>
        <div class="sixthelement"><p>Sixth</p></div>
        <div class="seventhelement"><p>Seventh</p></div>
      </div>
      <br /><br />
      <hr />
      <br /><br />
      <p>A Easy way to create grid is through <u>Grid Tempelate Area</u></p>
      <div class="gridtemplatearea">
        <div class="item1">
          <p>ItemOne</p>
        </div>
        <div class="item2">
          <p>ItemTwo</p>
        </div>
        <div class="item3">
          <p>ItemThree</p>
        </div>
        <div class="item4">
          <p>ItemFour</p>
        </div>
        <div class="item5">
          <p>ItemFive</p>
        </div>
      </div>
      <p>
        Although, It doesn't give you that level of control but it is good for
        basic simple grids.
      </p>
    </main>
  </body>
</html>
